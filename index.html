<!DOCTYPE html>
<html lang="no">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golf - Trening</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b2d1f;
  color:white;
}

.screen {
  display:none;
  padding:20px;
  padding-bottom:80px;
}
.active { display:block; }

.card {
  background:#123f2a;
  padding:18px;
  margin:10px 0;
  border-radius:12px;
  font-size:20px;
  cursor:pointer;
}

img {
  width:100%;
  border-radius:12px;
  margin-bottom:15px;
}

button {
  width:100%;
  padding:15px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1fa463;
  color:white;
  font-size:16px;
}

.navbar {
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  display:flex;
  background:#000;
}
.navbar button {
  flex:1;
  border-radius:0;
}
</style>
</head>

<body>

<div id="main" class="screen active">
  <h1>🏌️ Golf</h1>

  <div class="card" onclick="openCategory('oppvarming')">Oppvarming</div>
  <div class="card" onclick="openCategory('range')">Range</div>
  <div class="card" onclick="openCategory('chipping')">Chipping</div>
  <div class="card" onclick="openCategory('bunker')">Bunker</div>
  <div class="card" onclick="openCategory('putting')">Putting</div>
</div>

<div id="category" class="screen"></div>
<div id="exercise" class="screen"></div>

<div class="navbar">
  <button onclick="goBack()">← Tilbake</button>
  <button onclick="goMenu()">Meny</button>
  <button onclick="goNext()">Neste →</button>
</div>

<script>

const data = {

oppvarming: [
{navn:"Bekkentilt", tid:"2 min", fokus:["Beveg bekken frem og tilbake","Stabil overkropp","Kontrollert bevegelse"], bilde:"Bilder/bekkentilt.jpg"},
{navn:"Sidebøy rygg", tid:"2 min", fokus:["Bøy side til side","Unngå rotasjon","Rolig tempo"], bilde:"Bilder/sideboy.jpg"},
{navn:"Hofte/rygg separasjon", tid:"2 min", fokus:["Roter motsatt vei","Separasjon hofte/overkropp","Økt mobilitet"], bilde:"Bilder/hofte.jpg"},
{navn:"Skulderrotasjon", tid:"2 min", fokus:["Rolig rotasjon","Stabil kjerne","Kontrollert bevegelse"], bilde:"Bilder/skulder.jpg"},
{navn:"Rotasjon mot pinne", tid:"2 min", fokus:["Kontrollert rotasjon","Hold posisjon","Behold vinkler"], bilde:"Bilder/rotasjon.jpg"},
{navn:"Utoverrotasjon skulder", tid:"2 min", fokus:["Aktiver bakside skulder","Kontrollert bevegelse"], bilde:"Bilder/utover.jpg"},
{navn:"Helikopter", tid:"2 min", fokus:["Dynamisk rotasjon","Aktiver hele kroppen"], bilde:"Bilder/helikopter.jpg"}
],

range: [
{navn:"Grep", tid:"1 min", fokus:["Riktig grep","Ikke for stramt","Stabil håndposisjon"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/hvordan-ta-grepet", bilde:"Bilder/grep.jpg"},
{navn:"Halvsving", tid:"3 min", fokus:["Kontrollert sving","God balanse","Rent treff"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/halvsving-l-til-l.-y-til-l", bilde:"Bilder/halvsving.jpg"},
{navn:"Tau", tid:"3 min", fokus:["Tempo","Rytme","Sekvens i svingen"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/sving-tauet", bilde:"Bilder/tau.jpg"},
{navn:"Finish", tid:"2 min", fokus:["Stabil avslutning","Fullfør svingen"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/fleetwood-paraplyfinish", bilde:"Bilder/finish.jpg"},
{navn:"En fot", tid:"5 min", fokus:["Balanse","Kontroll"], bilde:"Bilder/enfot.jpg"},
{navn:"Take-away", tid:"10 min", fokus:["Riktig start","Kontrollert bevegelse"], bilde:"Bilder/takeaway.jpg"},
{navn:"Baksving", tid:"10 min", fokus:["God topp-posisjon","Stabilitet"], bilde:"Bilder/baksving.jpg"},
{navn:"Håndkle", tid:"15 min", fokus:["Treff ball først","God kontakt"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/sving-over-handduken", bilde:"Bilder/handkle.jpg"},
{navn:"Planken", tid:"10 min", fokus:["Correct svingspor"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/planken-lange-slag-med-svingspor", bilde:"Bilder/planke.jpg"},
{navn:"Pegg", tid:"10 min", fokus:["Presist treff","Kontroll"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/sving-over-peggen", bilde:"Bilder/pegg.jpg"}
],

chipping: [
{navn:"Rangebøtte", tid:"5 min", fokus:["Landingspunkt","Kontroll på lengde"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/chip-pitch-med-rangebotte", bilde:"Bilder/rangebøtte.jpg"},
{navn:"Åpent blad", tid:"5 min", fokus:["Myk landing","Kontroll"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/chippe-med-apent-blad", bilde:"Bilder/apent.jpg"},
{navn:"Planke chip", tid:"5 min", fokus:["Rett spor","Treff kvalitet"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/planken-chipping", bilde:"Bilder/planke_chip.jpg"},
{navn:"Crosshanded", tid:"5 min", fokus:["Rolige hender"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/chippe-crosshanded", bilde:"Bilder/cross.jpg"},
{navn:"Puttechip", tid:"5 min", fokus:["Minimal håndledd"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/puttechippen", bilde:"Bilder/puttechip.jpg"},
{navn:"ABC", tid:"15 min", fokus:["Spillbasert trening"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/chippeloype-block-random-practice", bilde:"Bilder/abc.jpg"}
],

bunker: [
{navn:"Streken", tid:"15 min", fokus:["Treff sand likt","Riktig dybde"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/streken", bilde:"Bilder/streken.jpg"},
{navn:"iPhone drill", tid:"20 min", fokus:["Stabil kropp","Riktig bevegelse"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/iphone-mobilen", bilde:"Bilder/iphone.jpg"}
],

putting: [
{navn:"Pegg til pegg", tid:"10 min", fokus:["Tempo","Linje","Stabil bevegelse"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/pegg-til-pegg", bilde:"Bilder/pegg_putting.jpg"},
{navn:"Skoleleken", tid:"30 min", fokus:["Presisjon","Kontroll"], video:"https://ovelsesbank.golfforbundet.no/ovelser/alle-ovelser/foten", bilde:"Bilder/skole.jpg"}
]

};

let currentList = [];
let currentIndex = 0;
let currentScreen = "main";

function openCategory(cat) {
  currentList = data[cat];
  currentScreen = "category";

  let html = "<h2>" + cat.toUpperCase() + "</h2>";

  for (let i = 0; i < currentList.length; i++) {
    html += '<div class="card" onclick="openExercise(' + i + ')">' + currentList[i].navn + '</div>';
  }

  document.getElementById("category").innerHTML = html;
  show("category");
}

function openExercise(i) {
  currentIndex = i;
  currentScreen = "exercise";
  renderExercise();
}

function renderExercise() {
  let e = currentList[currentIndex];

  let html = "";

  if (e.bilde) html += '<img src="' + e.bilde + '">';

  html += "<h1>" + e.navn + "</h1>";
  html += "<h2>" + e.tid + "</h2><ul>";

  for (let i = 0; i < e.fokus.length; i++) {
    html += "<li>" + e.fokus[i] + "</li>";
  }

  html += "</ul>";

  if (e.video) {
    html += '<button onclick="window.open(\'' + e.video + '\')">▶ Se video</button>';
  }

  document.getElementById("exercise").innerHTML = html;
  show("exercise");
}

function goBack() {
  if (currentScreen === "exercise") {
    if (currentIndex > 0) {
      currentIndex--;
      renderExercise();
    } else {
      show("category");
      currentScreen = "category";
    }
  } else if (currentScreen === "category") {
    show("main");
    currentScreen = "main";
  }
}

function goNext() {
  if (currentScreen === "exercise" && currentIndex < currentList.length - 1) {
    currentIndex++;
    renderExercise();
  }
}

function goMenu() {
  show("main");
  currentScreen = "main";
}

function show(id) {
  document.getElementById("main").classList.remove("active");
  document.getElementById("category").classList.remove("active");
  document.getElementById("exercise").classList.remove("active");

  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
